<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Camera Inference Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260408g" />
</head>
<body>
  <header>
    <span class="logo">&#x1F916; Robot Camera Inference</span>
    <div id="status-bar">
      <span id="cam-status"  class="badge">Camera&nbsp;—</span>
      <span id="ws-status"   class="badge">WebSocket&nbsp;—</span>
      <span id="last-inferred-header">Recent Inference: —</span>
    </div>
  </header>

  <main>
    <div class="left-stack">
      <!-- ── Live camera feed ───────────────────────────── -->
      <section class="panel" id="camera-panel">
        <div class="panel-title">Live Feed</div>
        <div class="video-wrap">
          <img id="mjpeg" src="/stream.mjpeg" alt="Live feed" />
          <canvas id="det-overlay" aria-hidden="true"></canvas>
          <div id="cam-overlay" class="overlay hidden">Camera not ready</div>
        </div>
      </section>

      <!-- ── Drive control (separate block) ─────────────── -->
      <section class="panel" id="control-panel">
        <div class="panel-title">Drive Control</div>
        <div id="drive-panel" class="drive-panel">
          <div class="drive-row">
            <button id="mode-interactive" class="mode-btn" type="button">Manual Mode</button>
            <button id="mode-vlm" class="mode-btn" type="button">VLM Auto Cruise</button>
          </div>
          <div id="drive-status" class="drive-status">Drive mode: loading...</div>
          <div id="manual-pad" class="manual-pad">
            <button class="drive-btn up" data-action="forward" type="button">▲ Forward</button>
            <button class="drive-btn left" data-action="left" type="button">◀ Left</button>
            <button class="drive-btn stop" data-action="stop" type="button">■ Stop</button>
            <button class="drive-btn right" data-action="right" type="button">Right ▶</button>
            <button class="drive-btn down" data-action="back" type="button">▼ Back</button>
          </div>
          <div class="drive-tip">
            Keyboard: W/A/S/D, arrow keys, space to stop
            · <a href="/drive-logs">View drive logs</a>
          </div>
        </div>
      </section>
    </div>

    <!-- ── Inference result ──────────────────────────────── -->
    <section class="panel" id="result-panel">
      <div class="panel-title">
        Navigation Assessment
        <span id="frame-badge" class="frame-badge hidden"></span>
        <span id="last-inferred-panel" class="last-inf">—</span>
      </div>

      <!-- Current result card -->
      <div id="current-card" class="inf-card">
        <div class="inf-status-row">
          <span id="inf-cat"  class="inf-cat">—</span>
          <span id="inf-space" class="inf-space">Free space: —</span>
        </div>
        <div class="inf-section">
          <div class="inf-label">Hazards</div>
          <div id="inf-hazards" class="inf-value">—</div>
        </div>
        <div class="inf-section">
          <div class="inf-label">Action</div>
          <div id="inf-action" class="inf-value">—</div>
        </div>
        <div class="inf-section">
          <div class="inf-label">Reason</div>
          <div id="inf-reason" class="inf-value">—</div>
        </div>
        <div id="inf-error" class="inf-error hidden"></div>
      </div>

      <!-- History log -->
      <div class="hist-header">
        <span>History</span>
        <button id="clear-hist" onclick="clearHistory()">Clear</button>
      </div>
      <div id="hist-list" class="hist-list"></div>
    </section>
  </main>

  <script src="/static/app.js?v=20260408g"></script>
</body>
</html>
